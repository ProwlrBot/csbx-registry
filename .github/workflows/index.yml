name: Generate INDEX.md

on:
  push:
    branches: [main]
    paths:
      - 'registry.yaml'
      - 'tools/generate-index.py'
      - '.github/workflows/index.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: index-generation
  cancel-in-progress: false

jobs:
  regenerate:
    name: Regenerate INDEX.md
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Python deps
        run: pip install --quiet pyyaml

      - name: Run generator
        run: python3 tools/generate-index.py --out INDEX.md

      - name: Commit if changed
        run: |
          if git diff --quiet INDEX.md; then
            echo "INDEX.md unchanged"
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add INDEX.md
          git commit -m "chore(index): regenerate INDEX.md from registry.yaml"
          git push
