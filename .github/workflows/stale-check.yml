name: Stale Entry Check

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Skip GitHub API calls and emit synthetic findings (for self-test)'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write

concurrency:
  group: stale-check
  cancel-in-progress: false

jobs:
  scan:
    name: Scan registry for stale entries
    runs-on: ubuntu-latest
    env:
      DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Python deps
        run: pip install --quiet pyyaml

      - name: Run scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 scripts/intake/scan-stale-entries.py > /tmp/stale.jsonl
          echo "Found $(wc -l < /tmp/stale.jsonl) stale finding(s)"
          cat /tmp/stale.jsonl

      - name: Open or update tracking issues
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const lines = fs.readFileSync('/tmp/stale.jsonl', 'utf8')
              .split('\n').filter(Boolean);
            if (lines.length === 0) {
              core.notice('No stale entries found');
              return;
            }

            const dryRun = process.env.DRY_RUN === 'true';
            const { owner, repo } = context.repo;

            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: 'open', labels: 'stale-entry', per_page: 100,
            });

            try {
              await github.rest.issues.createLabel({
                owner, repo,
                name: 'stale-entry',
                color: 'e4b400',
                description: 'Auto-opened by stale-check workflow',
              });
            } catch (e) {
              if (e.status !== 422) throw e;
            }

            let openedCount = 0;
            let touchedCount = 0;

            for (const line of lines) {
              const f = JSON.parse(line);
              const title = `[stale-entry] ${f.section}/${f.name}: ${f.reason}`;
              const body = [
                `The scheduled stale-check workflow detected an issue with this registry entry.`,
                ``,
                `**Entry:** \`${f.section}/${f.name}\``,
                `**Repo:** ${f.repo}`,
                `**Reason:** \`${f.reason}\``,
                `**Detail:** ${f.detail}`,
                ``,
                `### What this means`,
                ``,
                `One of the following:`,
                ``,
                `- the upstream repository was archived, deleted, or made private`,
                `- the declared release tag was deleted or never existed`,
                `- a transient GitHub API error during the scan (re-run the workflow to confirm)`,
                ``,
                `### Next steps for maintainers`,
                ``,
                `1. Confirm the finding by visiting the upstream repo manually.`,
                `2. If genuinely stale, open a removal PR.`,
                `3. If a transient error, close this issue with a comment noting the cause.`,
                ``,
                `_Auto-opened by \`.github/workflows/stale-check.yml\` (run #${context.runId}). Will be refreshed on the next scan if the condition persists._`,
              ].join('\n');

              const match = existing.find(i => i.title === title);
              if (match) {
                touchedCount++;
                if (!dryRun) {
                  await github.rest.issues.createComment({
                    owner, repo, issue_number: match.number,
                    body: `Still stale as of run #${context.runId}. Detail: ${f.detail}`,
                  });
                }
                core.info(`Existing issue #${match.number}: ${title}`);
                continue;
              }

              if (dryRun) {
                core.info(`[DRY_RUN] would open: ${title}`);
                continue;
              }
              const created = await github.rest.issues.create({
                owner, repo, title, body, labels: ['stale-entry'],
              });
              openedCount++;
              core.info(`Opened #${created.data.number}: ${title}`);
            }

            core.notice(`stale-check: opened ${openedCount}, refreshed ${touchedCount}`);
