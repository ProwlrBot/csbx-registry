version: 1
policy_version: "2026-04-25"
updated: "2026-04-12"

# pdtm-format tools: install via `csbx pdtm <name>` (resolves through this section)
pdtm_tools:
  subfinder:
    repo: projectdiscovery/subfinder
    install_type: go
    go_install_path: github.com/projectdiscovery/subfinder/v2/cmd/subfinder
    version: latest
  httpx:
    repo: projectdiscovery/httpx
    install_type: go
    go_install_path: github.com/projectdiscovery/httpx/cmd/httpx
    version: latest
  nuclei:
    repo: projectdiscovery/nuclei
    install_type: go
    go_install_path: github.com/projectdiscovery/nuclei/v3/cmd/nuclei
    version: latest
  katana:
    repo: projectdiscovery/katana
    install_type: go
    go_install_path: github.com/projectdiscovery/katana/cmd/katana
    version: latest
  dalfox:
    repo: hahwul/dalfox
    install_type: go
    go_install_path: github.com/hahwul/dalfox/v2@latest
    version: latest
  gau:
    repo: lc/gau
    install_type: go
    go_install_path: github.com/lc/gau/v2/cmd/gau
    version: latest
  waybackurls:
    repo: tomnomnom/waybackurls
    install_type: go
    go_install_path: github.com/tomnomnom/waybackurls
    version: latest
  ffuf:
    repo: ffuf/ffuf
    install_type: go
    go_install_path: github.com/ffuf/ffuf/v2
    version: latest

plugins:
  # ── Wordlists ────────────────────────────────────────────────
  seclists:
    repo: https://github.com/danielmiessler/SecLists
    type: wordlist
    description: "Discovery, fuzzing, and password lists"
    size: "1.2GB"
    tags: [recon, fuzzing, passwords, discovery]

  payloadsallthethings:
    repo: https://github.com/swisskyrepo/PayloadsAllTheThings
    type: wordlist
    description: "Payload lists for web application security"
    size: "200MB"
    tags: [payloads, injection, xss, sqli, ssti]

  onelistforall:
    repo: https://github.com/six2dez/OneListForAll
    type: wordlist
    description: "Merged wordlists for web fuzzing"
    size: "500MB"
    tags: [fuzzing, discovery]

  fuzzdb:
    repo: https://github.com/fuzzdb-project/fuzzdb
    type: wordlist
    description: "Attack patterns and payload lists for fuzzing"
    size: "60MB"
    tags: [fuzzing, payloads]

  assetnote-wordlists:
    repo: https://github.com/assetnote/wordlists
    type: wordlist
    description: "Assetnote automated wordlists"
    size: "2GB"
    tags: [recon, fuzzing, subdomains]

  leaky-paths:
    repo: https://github.com/ayoubfathi/leaky-paths
    type: wordlist
    description: "Common sensitive path wordlists"
    size: "1MB"
    tags: [discovery, paths, sensitive]

  # ── Nuclei Templates ────────────────────────────────────────
  nuclei-templates:
    repo: https://github.com/projectdiscovery/nuclei-templates
    type: nuclei-templates
    description: "Official ProjectDiscovery nuclei templates"
    size: "180MB"
    tags: [scanning, cves, vulnerabilities]

  nuclei-templates-community:
    repo: https://github.com/projectdiscovery/nuclei-templates
    type: nuclei-templates
    description: "Community-contributed nuclei templates"
    size: "180MB"
    tags: [scanning, community]

  fuzzing-templates:
    repo: https://github.com/projectdiscovery/fuzzing-templates
    type: nuclei-templates
    description: "Nuclei fuzzing templates"
    size: "5MB"
    tags: [fuzzing, nuclei]

  # ── Configs ──────────────────────────────────────────────────
  gf-patterns:
    repo: https://github.com/1ndianl33t/Gf-Patterns
    type: config
    description: "GF patterns for bug bounty recon"
    size: "50KB"
    tags: [recon, patterns, gf]

  # ── YARA Rules ───────────────────────────────────────────────
  capa-rules:
    repo: https://github.com/mandiant/capa-rules
    type: yara-rules
    description: "Mandiant capa capability rules for PE/ELF/.NET"
    size: "8MB"
    tags: [malware, capa, capabilities, mandiant]

  signature-base:
    repo: https://github.com/Neo23x0/signature-base
    type: yara-rules
    description: "Florian Roth's YARA rules — APT, webshells, hack tools, maldocs"
    size: "40MB"
    tags: [malware, apt, webshells, hacktools, neo23x0]

  yara-rules-community:
    repo: https://github.com/YARA-Rules/rules
    type: yara-rules
    description: "Community-maintained YARA rules across malware families"
    size: "20MB"
    tags: [malware, yara, community]

  # ── Sigma Rules ──────────────────────────────────────────────
  sigma:
    repo: https://github.com/SigmaHQ/sigma
    type: sigma
    description: "SigmaHQ detection rules for logs and EDR"
    size: "30MB"
    tags: [detection, siem, edr, sigma]

  # ── Threat Intel ─────────────────────────────────────────────
  misp-warninglists:
    repo: https://github.com/MISP/misp-warninglists
    type: threat-intel
    description: "MISP warning lists for false-positive reduction on IOCs"
    size: "60MB"
    tags: [misp, ioc, warninglists, threat-intel]

  # ── Shell Themes ─────────────────────────────────────────────
  powerlevel10k:
    repo: https://github.com/romkatv/powerlevel10k
    type: theme
    description: "Zsh theme with instant prompt"
    size: "4MB"
    tags: [shell, theme, zsh]

  zsh-autosuggestions:
    repo: https://github.com/zsh-users/zsh-autosuggestions
    type: theme
    description: "Fish-like autosuggestions for zsh"
    size: "200KB"
    tags: [shell, zsh]

  zsh-syntax-highlighting:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting
    type: theme
    description: "Syntax highlighting for zsh"
    size: "500KB"
    tags: [shell, zsh]

# ──────────────────────────────────────────────────────────────────
# Caido plugins
# ──────────────────────────────────────────────────────────────────
# Plugins for the Caido HTTP toolkit (https://caido.io).
#
# Strict intake policy applies — every entry MUST declare:
#   - release:    git tag the intake workflow will pull
#   - manifest:   path to the Caido manifest inside the release artifact
#   - signature:  cosign keyless OR minisign signing block
#   - platforms:  (optional) declared install targets
#
# The Plugin Intake Check workflow blocks merge if signature verification
# fails or if SAST surfaces HIGH/CRITICAL findings on the source tree.
# See intake/POLICY.md for the full check list and remediation guidance.
#
# Candidate research that has not yet landed (most commonly because the
# upstream release is not yet cosign-signed) lives in
# intake/CAIDO_CANDIDATES.md. Nominate new candidates via the
# Caido plugin candidate issue template at
# .github/ISSUE_TEMPLATE/caido-plugin-candidate.md.
#
# Community submissions are welcome. Open a PR; do not edit this file
# manually unless you are also opening that PR.
# ──────────────────────────────────────────────────────────────────
caido_plugins: {}

